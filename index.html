<script>
        const SUPABASE_URL = "https://jazfynhpbbsrkipbozov.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_Q3rfsqf5Nv_O_UNxKKiang_P0h14TPF";

        // RENAMED to supabaseClient to prevent clashing with the library name
        let supabaseClient;
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (initError) {
            alert("Supabase Initialization Error: " + initError.message);
        }

        document.getElementById('geocache-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            
            const password = document.getElementById('cache-password').value.trim();
            const username = document.getElementById('username').value.trim();
            const message = document.getElementById('message').value.trim();

            submitBtn.disabled = true;
            submitBtn.innerText = "Verifying & Saving...";
            errorMsg.classList.add('hidden');

            try {
                // Calls the secure server function using our renamed client variable
                const { data: success, error } = await supabaseClient.rpc('log_visit', {
                    entered_password: password,
                    cacher_username: username,
                    cacher_message: message
                });

                if (error) {
                    alert("Database Error: " + error.message + "\nDetails: " + error.details + "\nHint: " + error.hint);
                    throw error;
                }

                if (success === true) {
                    document.getElementById('form-section').classList.add('hidden');
                    document.getElementById('success-section').classList.remove('hidden');
                } else {
                    alert("Submission failed: The code you typed doesn't match 'goc2026'.");
                    errorMsg.innerText = "Incorrect secret code. Check the container closely!";
                    errorMsg.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit Logbook";
                }
            } catch (err) {
                alert("JavaScript Catch Error: " + err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Logbook";
            }
        });
    </script>
